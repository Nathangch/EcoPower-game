<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPower - Simulador de Redes Elétricas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Sidebar for Creative Mode -->
        <div id="sidebar" class="hidden">
            <h2 class="sidebar-title">INVENTÁRIO</h2>
            <div id="category-selector"></div>
            <div id="item-separator"></div>
            <div id="item-list"></div>
        </div>

        <!-- Main Game Area -->
        <main id="game-container">
            <header id="top-bar">
                <div class="top-left">
                    <button id="btn-menu" class="btn-secondary">⮌ Menu</button>
                    <button id="btn-power" class="btn-power-off">▶ LIGAR REDE</button>
                    <span id="lbl-info">Planeje a rede</span>
                </div>
                <div class="top-right">
                    <div id="world-hud" class="hidden">
                        <span id="lbl-time">🕒 12:00</span>
                        <span id="lbl-env">☀️ 100% | 🌬️ 50%</span>
                    </div>
                    <div id="hud-stats">
                        <span id="lbl-fase">FASE 1/25</span>
                        <span id="lbl-diff">Dificuldade: FÁCIL</span>
                    </div>
                    <button id="btn-reset" class="btn-danger">Reset Nível</button>
                </div>
            </header>

            <canvas id="game-canvas"></canvas>

            <div id="sustainability-container" class="hidden">
                <div class="sus-bar-bg">
                    <div id="sus-progress"></div>
                </div>
                <span id="lbl-sus">Sustentabilidade: 100%</span>
            </div>

            <!-- Overlays -->
            <div id="menu-overlay" class="overlay">
                <div class="card">
                    <h1>EcoPower ⚡</h1>
                    <p class="subtitle">Simulador de Redes Elétricas</p>
                    <div class="menu-options">
                        <button class="btn-main" onclick="startGame('EDUCACIONAL')">🎒 Modo Educativo</button>
                        <button class="btn-main" onclick="startGame('SUSTENTAVEL')">🌿 Modo Sustentável</button>
                        <button class="btn-main" onclick="startGame('CRIATIVO')">🎨 Modo Criativo</button>
                    </div>
                    <div class="menu-download">
                        <p>Preferência por Desktop?</p>
                        <div class="dl-buttons">
                            <a href="EcoPower.exe" download class="dl-link">⬇️ Baixar .EXE (Windows)</a>
                            <a href="game.py" download class="dl-link">🐍 Baixar Script Python</a>
                        </div>
                    </div>
                </div>
            </div>

            <div id="help-btn-container">
                <button id="btn-help" class="btn-help">❓ Como Jogar?</button>
            </div>
        </main>
    </div>

    <!-- Victory Modal -->
    <div id="victory-modal" class="modal hidden">
        <div class="modal-content victory-card">
            <h2 id="vic-title">🏆 FASE CONCLUÍDA!</h2>
            <div class="msg-box">
                <p class="msg-label">O que você aprendeu:</p>
                <p id="vic-msg"></p>
            </div>
            <button id="btn-next" class="btn-success">PRÓXIMA FASE ➔</button>
        </div>
    </div>

    <!-- Help Modal -->
    <div id="help-modal" class="modal hidden">
        <div class="modal-content help-card">
            <h2 id="help-title">Guia Rápido</h2>
            <div id="help-text"></div>
            <button onclick="closeModal('help-modal')" class="btn-danger">Fechar</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
